name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Generate AI release notes
        run: |
          FROM=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$FROM" ]; then
            FLAG="--initial"
            FROM=$(git rev-list --max-parents=0 HEAD)
          else
            FLAG=""
          fi
          go run ./cmd/releasenotes $FLAG --from "$FROM" --to HEAD > release-notes.md
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Build Windows binary
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-X main.version=${GITHUB_REF_NAME}" -o quill-commit-windows-amd64.exe .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: quill-commit-windows-amd64.exe
